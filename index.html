<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>왜 내가 쓰는 AI만 멍청해 보일까? · 30초 AI 활용 유형 테스트</title>
<meta property="og:title" content="30초 AI 활용 유형 테스트">
<meta property="og:description" content="내 AI가 멍청했던 게 아니었다. 같은 AI를 써도 결과가 다른 이유를 30초 만에 확인하세요.">
<style>
  :root {
    --accent: #6667AB;
    --bg: #f7f7fa;
    --ink: #1c1c24;
    --sub: #5c5c6b;
    --card: #ffffff;
    --line: #e4e4ec;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--ink);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  .screen { display: none; min-height: 100dvh; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); max-width: 480px; margin: 0 auto; flex-direction: column; }
  .screen.active { display: flex; }
  .center { justify-content: center; }
  .teaser { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 10px; }
  .t-chip {
    font-size: 13px; font-weight: 600; color: var(--sub);
    border: 1.5px solid var(--line); background: var(--card);
    padding: 6px 12px; border-radius: 999px;
  }
  .t-chip.hot { color: var(--accent); border-color: var(--accent); }
  .badge {
    display: inline-block; align-self: flex-start;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 700;
    padding: 4px 12px; border-radius: 999px; letter-spacing: .02em;
  }
  h1 { font-size: clamp(24px, 7vw, 28px); line-height: 1.38; margin: 18px 0 12px; word-break: keep-all; letter-spacing: -.02em; text-wrap: balance; }
  .sub { color: var(--sub); font-size: 15px; word-break: keep-all; }
  .btn {
    display: block; width: 100%; border: 0; cursor: pointer;
    background: var(--ink); color: #fff; font-size: 17px; font-weight: 700;
    padding: 16px; border-radius: 14px; margin-top: 24px; font-family: inherit;
  }
  .btn.accent { background: var(--accent); }
  .btn.ghost { background: transparent; color: var(--sub); font-weight: 500; font-size: 14px; padding: 10px; margin-top: 8px; }
  .btn.outline { background: var(--card); color: var(--ink); border: 1.5px solid var(--line); font-weight: 600; margin-top: 10px; }
  .btn.cta-main {
    font-size: 18px; padding: 18px 16px; border-radius: 16px; margin-top: 26px;
    box-shadow: 0 6px 18px rgba(102,103,171,.35); line-height: 1.4; word-break: keep-all;
  }
  .btn.cta-main .cta-sub { display: block; font-size: 15px; font-weight: 600; opacity: .88; margin-top: 3px; }
  .btn:active { transform: scale(.985); }
  /* 문항 */
  .progress-wrap { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; width: 0; background: var(--accent); transition: width .25s ease; }
  .progress-label { font-size: 13px; color: var(--sub); margin-bottom: 20px; }
  .q-text { font-size: clamp(19px, 5.4vw, 21px); font-weight: 700; line-height: 1.45; margin-bottom: 22px; word-break: keep-all; min-height: 3.5em; text-wrap: balance; }
  .choice {
    display: block; width: 100%; text-align: left; cursor: pointer; font-family: inherit;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 16px; margin-bottom: 10px; font-size: 16px; line-height: 1.5; min-height: 56px;
    word-break: keep-all; color: var(--ink); transition: border-color .15s, background .15s;
  }
  .choice:active { border-color: var(--accent); background: #f2f2fb; }
  .choice .num { color: var(--accent); font-weight: 700; margin-right: 6px; }
  .slide-in { animation: slide .28s ease; }
  @keyframes slide { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: none; } }
  /* 인터스티셜 */
  .reveal-box { background: var(--ink); color: #fff; border-radius: 18px; padding: 28px 24px; }
  .reveal-box p { word-break: keep-all; font-size: 17px; line-height: 1.7; }
  .reveal-box .em { color: #b9baf0; font-weight: 700; }
  /* 결과 */
  .result-card { background: var(--card); border-radius: 18px; padding: 26px 22px; border-top: 6px solid var(--type-color, var(--accent)); box-shadow: 0 4px 20px rgba(0,0,0,.06); }
  .nick-label { font-size: 13px; font-weight: 700; color: var(--sub); letter-spacing: .05em; margin-bottom: 4px; }
  .nick { font-size: clamp(26px, 7.6vw, 30px); font-weight: 900; color: var(--ink); word-break: keep-all; line-height: 1.3; text-wrap: balance; }
  .type-name { font-size: 19px; font-weight: 800; color: var(--type-color, var(--accent)); margin-top: 6px; }
  .stars { margin: 10px 0 16px; }
  .blk { display: inline-flex; gap: 4px; align-items: center; }
  .blk i { width: 14px; height: 14px; border-radius: 4px; background: var(--line); }
  .blk i.on { background: var(--type-color, var(--accent)); }
  .t-chip .blk { gap: 3px; vertical-align: -1px; }
  .t-chip .blk i { width: 8px; height: 8px; border-radius: 2.5px; }
  .t-chip .blk i.on { background: var(--accent); opacity: .75; }
  .t-chip.hot .blk i.on { opacity: 1; }
  .type-desc { font-size: 15.5px; word-break: keep-all; overflow-wrap: break-word; }
  .type-desc .lead { font-weight: 800; font-size: 16.5px; }
  .pair-box .pair-guide { display: block; font-size: 13.5px; color: var(--sub); margin-top: 4px; }
  .book-line .bl-title { font-weight: 700; font-size: 15px; color: var(--ink); }
  .section-label { font-size: 13px; font-weight: 700; color: var(--sub); margin: 22px 0 8px; letter-spacing: .04em; }
  .unsaid { background: var(--card); border-radius: 14px; padding: 16px; font-size: 15px; word-break: keep-all; }
  .unsaid b { color: var(--type-color, var(--accent)); }
  .dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .dist-row .name { width: 52px; color: var(--sub); flex-shrink: 0; }
  .dist-row .bar-bg { flex: 1; height: 12px; background: var(--line); border-radius: 6px; overflow: hidden; }
  .dist-row .bar { height: 100%; border-radius: 6px; background: var(--type-color, var(--accent)); opacity: .45; }
  .dist-row.mine .bar { opacity: 1; }
  .dist-row .cnt { width: 16px; text-align: right; color: var(--sub); }
  .growth { font-size: 13.5px; color: var(--sub); margin-top: 8px; word-break: keep-all; }
  .growth b { color: var(--type-color, var(--accent)); }
  .pair-box { background: var(--card); border-radius: 14px; padding: 16px; font-size: 15px; word-break: keep-all; }
  .pair-box .pair-name { font-weight: 800; color: var(--type-color, var(--accent)); }
  .book-line { font-size: 14px; color: var(--sub); text-align: center; margin-top: 24px; word-break: keep-all; white-space: pre-line; }
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; font-size: 14px; padding: 12px 20px;
    border-radius: 18px; opacity: 0; pointer-events: none; transition: all .3s;
    max-width: calc(100vw - 48px); width: max-content; text-align: center; word-break: keep-all;
  }
  .toast.on { opacity: 1; transform: translateX(-50%); }
  /* 유형 테마 4종 — 베리페리 명도 사다리(브랜드 2색 체계 내) */
  .theme-search   { --type-color: #9B9CB8; }
  .theme-command  { --type-color: #7678C4; }
  .theme-collab   { --type-color: #4B4C82; }
  .theme-designer { --type-color: #6667AB; }
</style>
</head>
<body>

<!-- 인트로 -->
<section id="intro" class="screen active center">
  <span class="badge" id="dday-badge">7/21 출간</span>
  <h1>왜 내가 쓰는 AI만<br>멍청해 보일까?</h1>
  <p class="sub">같은 AI를 쓰는데 왜 내 결과만 이럴까요?<br>8개 질문, 30초면 당신이 AI를 쓰는 방식이 드러납니다.</p>
  <div class="teaser">
    <span class="t-chip">검색형 <span class="blk"><i class="on"></i><i class="on"></i><i></i><i></i><i></i></span></span><span class="t-chip">지시형 <span class="blk"><i class="on"></i><i class="on"></i><i class="on"></i><i></i><i></i></span></span>
    <span class="t-chip">협업형 <span class="blk"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i></span></span><span class="t-chip hot">설계자형 <span class="blk"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i></span></span>
  </div>
  <p class="sub" style="font-size:13.5px">당신은 어느 쪽인가요?</p>
  <p class="sub" id="from-line" style="display:none; margin-top:10px; font-size:14.5px; color:var(--accent); font-weight:700"></p>
  <button class="btn accent" onclick="startQuiz()">30초 테스트 시작</button>
</section>

<!-- 문항 -->
<section id="quiz" class="screen">
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
  <div class="progress-label" id="plabel"></div>
  <div id="q-body"></div>
  <button class="btn ghost" id="back-btn" onclick="goBack()">← 이전 문항</button>
</section>

<!-- 정답 공개 인터스티셜 -->
<section id="reveal" class="screen center">
  <div class="reveal-box slide-in">
    <p>잠깐, 방금 8개 질문을 떠올려보세요.</p>
    <p style="margin-top:14px"><span class="em">AI가 얼마나 똑똑한지 묻는 질문은<br>하나도 없었어요.</span></p>
    <p style="margin-top:14px">전부 '내가 AI에게 뭘 말했는지'에 대한 질문이었죠.<br>결과가 갈리는 이유도 바로 거기에 있어요.</p>
    <p style="margin-top:14px; font-size:15px; color:#b6b6c8; white-space:pre-line" id="reveal-personal"></p>
  </div>
  <button class="btn accent" onclick="startAnalyzing()">내 유형 확인하기</button>
</section>

<!-- 분석 연출 -->
<section id="analyzing" class="screen center">
  <div style="text-align:center">
    <div class="progress-wrap" style="max-width:220px;margin:0 auto 18px"><div class="progress-bar" id="a-bar"></div></div>
    <p class="sub" id="a-msg" style="font-size:16px"></p>
  </div>
</section>

<!-- 결과 -->
<section id="result" class="screen">
  <div class="result-card slide-in">
    <div class="nick-label">나는 이런 사람</div>
    <div class="nick" id="r-nick"></div>
    <div class="type-name" id="r-name"></div>
    <div class="stars" id="r-stars"></div>
    <p class="type-desc" id="r-desc"></p>
  </div>

  <div class="section-label">당신이 AI에게 말하지 않는 것</div>
  <div class="unsaid" id="r-unsaid"></div>

  <div class="section-label">응답 분포</div>
  <div id="r-dist"></div>
  <p class="growth" id="r-growth"></p>

  <div class="section-label">함께 쓰면 최고의 페어</div>
  <div class="pair-box" id="r-pair"></div>

  <button class="btn accent cta-main" id="cta-btn" onclick="goPreorder()"></button>

  <button class="btn outline" id="share-card-btn" onclick="shareCard()">결과 이미지 저장하기</button>
  <button class="btn outline" id="share-link-btn" onclick="shareLink()">친구에게 테스트 보내기</button>
  <div class="toast" id="toast"></div>

  <p class="book-line" id="book-line"></p>
  <button class="btn ghost" onclick="restart()">다시 테스트하기</button>
</section>

<script>
"use strict";

// ─────────────────────────────────────────────
// 상수 · 데이터 (event-spec.md 정본과 동일)
// ─────────────────────────────────────────────
const PREORDER_URL = "https://litt.ly/ellieisfree";
const PUB_DATE = "2026-07-21"; // 출간일 (D-day 배지)

// ── 계측 (7차 개정) ──
// GoatCounter 계정 발급 후 코드 기입 (예: "clearset" → https://clearset.goatcounter.com)
// 비어 있으면 계측을 조용히 생략한다 — 페이지 동작에 영향 없음.
const GC_CODE = "ellieisfree";
function track(event) {
  if (!GC_CODE || location.protocol === "file:") return;
  const img = new Image();
  img.src = "https://" + GC_CODE + ".goatcounter.com/count?p=" + encodeURIComponent("/" + event) + "&rnd=" + Date.now();
}

// 선택지 순서 고정: [0]검색형 [1]지시형 [2]협업형 [3]설계자형
const QUESTIONS = [
  { axis: "시작 조건", q: "AI에게 처음 일을 시킬 때, 당신의 첫 문장은?", a: [
    "\"○○가 뭐야?\" 궁금한 걸 한 줄로 묻는다",
    "\"○○ 정리해줘. 보고서처럼.\" 할 일을 명령한다",
    "일단 시켜보고, 답을 보면서 대화로 고쳐나간다",
    "시작 전에 목적·독자·형식·제외 조건부터 적는다" ]},
  { axis: "요청 점검", q: "AI의 답이 마음에 안 들면?", a: [
    "역시 AI는 아직 멀었다고 생각하고 창을 닫는다",
    "\"다시 해줘. 더 잘.\" 같은 요청을 반복한다",
    "어디가 왜 아쉬운지 말해주고 다시 시킨다",
    "답이 아니라 내 요청문을 다시 읽고, 빠진 조건을 찾는다" ]},
  { axis: "맥락 설명", q: "당신의 프롬프트 길이는 보통?", a: [
    "한 줄. 검색어와 비슷하다",
    "두세 줄. 해야 할 일과 형식을 적는다",
    "대화가 쌓이며 길어진다. 처음은 짧다",
    "처음부터 길다. 맥락·예시·제약을 미리 넣는다" ]},
  { axis: "검증 조건", q: "AI가 그럴듯한 거짓(없는 논문·틀린 수치)을 내놨다면?", a: [
    "AI가 거짓말쟁이라는 증거라고 생각한다",
    "\"정확한 것만 줘\"라고 다시 명령한다",
    "하나씩 검증해달라고 대화로 되짚는다",
    "\"실재 확인된 것만, 없으면 없다고 답할 것\"을 처음부터 조건으로 건다" ]},
  { axis: "형식 조건", q: "결과물의 형식(표·목차·분량)은 누가 정하나?", a: [
    "생각해본 적 없다. 나오는 대로 본다",
    "\"표로 만들어줘\" 정도는 말한다",
    "초안을 받은 뒤 형식을 바꿔달라고 한다",
    "요청할 때 형식·분량·예시 샘플까지 정해서 준다" ]},
  { axis: "반복 구조", q: "매주 반복하는 업무를 AI로 처리한다면?", a: [
    "그때그때 새로 물어본다",
    "지난번에 쓴 명령문을 복사해서 다시 쓴다",
    "지난 대화 이어서 \"지난번처럼\" 시킨다",
    "조건·예시를 정리한 나만의 요청 틀을 만들어 다듬는다" ]},
  { axis: "암묵 조건", q: "AI에게 일을 맡길 때 '말하지 않은 것'이 있다면?", a: [
    "말 안 해도 알아서 해주는 게 AI 아닌가",
    "중요한 건 말했으니 나머지는 AI 몫이다",
    "빠진 게 보이면 대화 중에 채운다",
    "말하지 않은 것이 결과를 정한다. 그래서 먼저 적는다" ]},
  { axis: "관점", q: "당신에게 AI란?", a: [
    "더 빠른 검색창",
    "말 잘 들어야 하는 부하 직원",
    "주고받으며 일하는 동료",
    "내가 설계한 조건 안에서 움직이는 시스템" ]},
];

// 조건 블록 레벨 = 유형 고정값 (채점 규칙)
const TYPES = [
  { key: "search", name: "검색형", level: 2, theme: "theme-search", color: "#B7B7D6",
    nick: "빛의 속도 질문러", tagline: "AI를 검색창처럼 쓰는 사람",
    pair: { type: 3, why: "당신의 한 줄 질문에 조건을 붙여줄 사람" },
    cta: "검색창처럼 쓰던 AI가 달라지는 법\n→ 책에서 확인하기",
    desc: "당신은 AI를 '더 빠른 검색창'으로 쓰고 있다.\nAI가 멍청해 보였다면, 그건 당신이 아무 조건도 주지 않았기 때문이다.\n프롬프트는 질문이 아니라 조건이다. 이 한 문장이 당신의 결과를 바꾼다." },
  { key: "command", name: "지시형", level: 3, theme: "theme-command", color: "#9C9DE0",
    nick: "결과 먼저 지시러", tagline: "명령은 하지만 설명은 안 하는 사람",
    pair: { type: 2, why: "당신의 명령에 대화를 붙여줄 사람" },
    cta: "'보고서처럼'의 함정에서 빠져나오는 법\n→ 책에서 확인하기",
    desc: "당신은 명령은 하지만 설명은 하지 않는다.\n'보고서처럼'이라는 말의 함정. 형식만 요구하면 형식만 그럴듯한 답이 온다.\n빠진 것은 지시가 아니라 조건이다." },
  { key: "collab", name: "협업형", level: 4, theme: "theme-collab", color: "#7678C4",
    nick: "티키타카 조련사", tagline: "AI와 핑퐁을 잘 치는 사람",
    pair: { type: 3, why: "당신의 핑퐁을 구조로 만들어줄 사람" },
    cta: "핑퐁 세 번을 한 번으로 줄이는 설계\n→ 책에서 확인하기",
    desc: "당신은 AI와 대화로 답을 다듬을 줄 안다.\n다만 매번 핑퐁으로 고치는 시간, 절반은 줄일 수 있다.\n처음부터 조건을 설계하면 세 번 주고받을 일이 한 번에 끝난다." },
  { key: "designer", name: "설계자형", level: 5, theme: "theme-designer", color: "#8A8BD4",
    nick: "조건의 건축가", tagline: "말하기 전에 조건부터 짓는 사람",
    pair: { type: 0, why: "당신의 설계에 속도를 붙여줄 사람" },
    cta: "설계 감각을 반복 가능한 구조로\n→ 책에서 확인하기",
    desc: "당신은 이미 설명을 설계하는 사람이다.\n말하지 않은 것이 결과를 정한다는 걸 안다.\n이제 그 감각을 반복 가능한 구조로 만들 차례다." },
];

// ─────────────────────────────────────────────
// 채점 (순수 함수 — 자가검증 대상)
// ─────────────────────────────────────────────
function tally(answers) {
  const counts = [0, 0, 0, 0];
  answers.forEach(a => counts[a]++);
  return counts;
}
// 최다 유형, 동점 시 상위 유형(설계자>협업>지시>검색) = 인덱스 큰 쪽 우선
function decideType(answers) {
  const counts = tally(answers);
  let best = 3;
  for (let i = 3; i >= 0; i--) if (counts[i] > counts[best]) best = i;
  return best;
}
// ①·② 응답이 나온 문항의 조건 축 상위 2개 = "말하지 않는 것"
function unsaidAxes(answers) {
  return answers.map((a, i) => (a <= 1 ? QUESTIONS[i].axis : null)).filter(Boolean).slice(0, 2);
}

// ─────────────────────────────────────────────
// 화면 전환 · 상태
// ─────────────────────────────────────────────
let answers = [];
let current = 0;

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

function startQuiz() { answers = []; current = 0; show("quiz"); renderQuestion(); track("start"); }

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById("pbar").style.width = ((current + 1) / QUESTIONS.length * 100) + "%";
  document.getElementById("plabel").textContent = (current + 1) + " / " + QUESTIONS.length;
  const nums = ["①", "②", "③", "④"];
  const body = document.getElementById("q-body");
  body.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.className = "slide-in";
  const qt = document.createElement("div");
  qt.className = "q-text";
  qt.textContent = "Q" + (current + 1) + ". " + q.q;
  wrap.appendChild(qt);
  q.a.forEach((text, idx) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = "<span class='num'>" + nums[idx] + "</span>" + text.replace(/</g, "&lt;");
    b.onclick = () => pick(idx);
    wrap.appendChild(b);
  });
  body.appendChild(wrap);
  document.getElementById("back-btn").style.visibility = current > 0 ? "visible" : "hidden";
}

function pick(idx) {
  answers[current] = idx;
  if (current < QUESTIONS.length - 1) { current++; renderQuestion(); }
  else {
    // 인터스티셜 개인화: ①·② 응답 문항을 짚어 '내 얘기'로 만든다
    const qs = answers.map((a, i) => (a <= 1 ? "Q" + (i + 1) : null)).filter(Boolean);
    document.getElementById("reveal-personal").textContent = qs.length
      ? "특히 " + qs.slice(0, 3).join(" · ") + "에서 당신은 조건을 생략했어요.\n결과에서 확인해보세요."
      : "당신은 거의 모든 문항에서 조건을 먼저 채우고 있었어요.";
    show("reveal");
    track("complete");
  }
}

function goBack() { if (current > 0) { current--; renderQuestion(); } }

// 결과 도출 연출: 2초 2단계 — '분석받았다'는 체감을 만든다
function startAnalyzing() {
  show("analyzing");
  const bar = document.getElementById("a-bar");
  const msg = document.getElementById("a-msg");
  bar.style.transition = "width 1s ease";
  bar.style.width = "0";
  msg.textContent = "당신이 말하지 않은 것을 세는 중…";
  setTimeout(() => { bar.style.width = "55%"; }, 60);
  setTimeout(() => { msg.textContent = "8개의 답에서 패턴을 찾는 중…"; bar.style.width = "100%"; }, 1050);
  setTimeout(showResult, 2050);
}

function showResult() {
  const t = TYPES[decideType(answers)];
  const res = document.getElementById("result");
  res.className = "screen active " + t.theme;
  document.getElementById("r-nick").textContent = t.nick;
  document.getElementById("r-name").textContent = t.name;
  document.getElementById("r-stars").innerHTML = "<span class='blk'>" +
    Array.from({length: 5}, (_, i) => i < t.level ? "<i class='on'></i>" : "<i></i>").join("") + "</span>";
  const descLines = t.desc.split("\n");
  document.getElementById("r-desc").innerHTML =
    "<span class=\"lead\">" + descLines[0] + "</span><br>" + descLines.slice(1).join("<br>");

  const axes = unsaidAxes(answers);
  document.getElementById("r-unsaid").innerHTML = axes.length
    ? "<b>" + axes.join(", ") + "</b>.<br>말하지 않은 것이 결과를 정한다. 여기서부터 채우면 된다."
    : "지금은 비어 있는 조건이 거의 없다.<br>문제는 조건이 아니라 <b>구조의 반복 가능성</b>이다.";

  const counts = tally(answers);
  const max = Math.max(...counts, 1);
  const mine = decideType(answers);
  document.getElementById("r-dist").innerHTML = TYPES.map((tp, i) =>
    "<div class='dist-row" + (i === mine ? " mine" : "") + "'>" +
    "<span class='name'>" + tp.name + "</span>" +
    "<div class='bar-bg'><div class='bar' style='width:" + (counts[i] / max * 100) + "%'></div></div>" +
    "<span class='cnt'>" + counts[i] + "</span></div>").join("");

  // 성장 서사: 설계자 기질 게이지 (재도전·책 연결 동기)
  const dCount = counts[3];
  document.getElementById("r-growth").innerHTML = mine === 3
    ? "설계자 기질 <b>8분의 " + dCount + "</b>.<br>남은 과제는 반복 가능한 구조다."
    : "당신 안의 설계자 기질 <b>8분의 " + dCount + "</b>.<br>조건을 하나씩 정할 때마다 유형이 바뀐다.";

  // 궁합: 친구에게 보낼 이유
  const pair = TYPES[t.pair.type];
  document.getElementById("r-pair").innerHTML =
    "<span class='pair-name'>" + pair.nick + " (" + pair.name + ")</span>. " + t.pair.why +
    ".<span class=\"pair-guide\">테스트를 보내거나, 스토리에 결과를 올리고 그 사람을 태그해보세요.</span>";

  const ctaLines = t.cta.split("\n");
  document.getElementById("cta-btn").innerHTML =
    ctaLines[0] + "<span class=\"cta-sub\">" + ctaLines[1] + "</span>";
  show("result");
  res.classList.add(t.theme);
  track("result-" + t.key);
}

function restart() { show("intro"); }
// CTA에 UTM 부착 — litt.ly 유입 중 테스트발·유형별 기여를 구분
function goPreorder() {
  const t = TYPES[decideType(answers)];
  track("cta-" + t.key);
  window.open(PREORDER_URL + "?utm_source=type-test&utm_medium=web&utm_campaign=preorder&utm_content=" + t.key, "_blank");
}

// 친구에게 보내기 — 다크소셜(카톡·DM) 루프. 모바일은 OS 공유시트, 미지원 시 문구 복사
// URL에 ?from=<유형>을 실어 받은 친구의 인트로를 개인화한다(페어 루프)
function shareLink() {
  const t = TYPES[decideType(answers)];
  track("share-link");
  const base = location.protocol === "file:" ? PREORDER_URL : location.origin + location.pathname;
  const url = base + "?from=" + t.key;
  const text = "나는 '" + t.nick + "'(" + t.name + ")이래. " + t.tagline + ".\n내 최고의 페어는 '" + TYPES[t.pair.type].nick + "'이라는데, 너는 어떤 유형이야? 30초 테스트 👉 " + url;
  if (navigator.share) {
    navigator.share({ text: text }).catch(() => {});
    return;
  }
  navigator.clipboard.writeText(text).then(() =>
    toast("공유 문구가 복사됐어요. 붙여넣기만 하면 돼요!"));
}

// 출간일 기준 문구 자동 전환 (출간 후에도 상시 사용 가능)
const DAYS_TO_PUB = Math.ceil((new Date(PUB_DATE + "T00:00:00+09:00") - new Date()) / 86400000);
const IS_PRE = DAYS_TO_PUB > 0;
// 판매 상태 문구: 예판 기간에만 '예약판매', 이후는 담백하게
(function () {
  const el = document.getElementById("dday-badge");
  if (IS_PRE) el.textContent = "7/21 출간 D-" + DAYS_TO_PUB;
  else if (DAYS_TO_PUB === 0) el.textContent = "오늘 출간";
  else el.textContent = "30초 자가진단";
})();

// 공유 능력 감지 — 되는 것만 약속한다 (버튼 문구 정직화)
(function () {
  const testFile = typeof File !== "undefined" ? new File([""], "t.png", { type: "image/png" }) : null;
  const canShareImg = !!(navigator.canShare && testFile && navigator.canShare({ files: [testFile] }));
  document.getElementById("share-card-btn").textContent =
    canShareImg ? "결과 이미지 공유하기" : "결과 이미지 저장하기";
  document.getElementById("share-link-btn").textContent =
    navigator.share ? "친구에게 테스트 보내기" : "공유 문구 복사하기";
})();

(function () {
  document.getElementById("book-line").innerHTML =
    "<span class=\"bl-title\">『왜 내가 쓰는 AI만 멍청해 보일까?』</span><br>@ellieisfree";
})();

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("on");
  setTimeout(() => el.classList.remove("on"), 2600);
}

// ─────────────────────────────────────────────
// 스토리 공유 카드 (1080×1920 canvas)
// ─────────────────────────────────────────────
function rr(x, X, y, w, h, r) { // roundRect 경로 (구브라우저 폴백 포함)
  if (x.roundRect) { x.beginPath(); x.roundRect(X, y, w, h, r); }
  else { x.beginPath(); x.rect(X, y, w, h); }
}
const KO = "-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif";

// 스토리 공유 카드 — 책 표지 톤(베리페리 반전 히어로 + 에디토리얼 그리드)
function drawCard() {
  const mine = decideType(answers);
  const t = TYPES[mine];
  const counts = tally(answers);
  const axes = unsaidAxes(answers);
  const c = document.createElement("canvas");
  c.width = 1080; c.height = 1920;
  const x = c.getContext("2d");
  const L = 168; // 본문 시작선(스파인 오른쪽)

  // 배경: 표지와 동일한 베리페리 단색 + 하단 미세 심도
  const bg = x.createLinearGradient(0, 0, 0, 1920);
  bg.addColorStop(0, "#6667AB"); bg.addColorStop(1, "#5A5B9C");
  x.fillStyle = bg; x.fillRect(0, 0, 1080, 1920);

  // 좌측 세로 스파인 + 틱마크 (에디토리얼 그리드 시그니처)
  x.strokeStyle = "rgba(255,255,255,0.55)"; x.lineWidth = 3;
  x.beginPath(); x.moveTo(120, 150); x.lineTo(120, 1770); x.stroke();
  x.lineWidth = 2;
  for (let ty = 150; ty <= 1770; ty += 108) {
    x.beginPath(); x.moveTo(120, ty); x.lineTo(140, ty); x.stroke();
  }

  const hair = (y) => {
    x.strokeStyle = "rgba(255,255,255,0.30)"; x.lineWidth = 1.5;
    x.beginPath(); x.moveTo(L, y); x.lineTo(960, y); x.stroke();
  };

  x.textAlign = "left";

  // 상단 레이블
  x.fillStyle = "rgba(255,255,255,0.85)"; x.font = "700 34px " + KO;
  x.fillText("30초 AI 활용 유형 테스트", L, 212);

  // 훅 타이포 (표지 히어로)
  x.fillStyle = "#ffffff"; x.font = "900 86px " + KO;
  x.fillText("내 AI가 멍청했던 게", L, 356);
  x.fillText("아니었다.", L, 470);

  hair(548);

  // 정체성
  x.fillStyle = "rgba(255,255,255,0.75)"; x.font = "600 38px " + KO;
  x.fillText("나는 이런 사람", L, 640);
  x.fillStyle = "#ffffff"; x.font = "900 100px " + KO;
  x.fillText(t.nick, L, 772);
  x.font = "800 54px " + KO;
  x.fillText(t.name, L, 866);
  const nameW = x.measureText(t.name).width;
  for (let i = 0; i < 5; i++) {
    rr(x, L + nameW + 34 + i * 40, 866 - 36, 28, 28, 8);
    x.fillStyle = i < t.level ? "#ffffff" : "rgba(255,255,255,0.30)";
    x.fill();
  }
  x.fillStyle = "#ffffff";
  x.fillStyle = "rgba(255,255,255,0.88)"; x.font = "600 42px " + KO;
  x.fillText(t.tagline, L, 940);

  hair(1006);

  // 내가 말하지 않는 것 — 타이포로만
  x.fillStyle = "rgba(255,255,255,0.75)"; x.font = "600 34px " + KO;
  x.fillText(axes.length ? "내가 AI에게 말하지 않는 것" : "빈 조건이 거의 없는 사람", L, 1084);
  if (axes.length) {
    x.fillStyle = "#ffffff"; x.font = "800 50px " + KO;
    x.fillText(axes.join(" · "), L, 1156);
  }

  hair(1222);

  // 응답 분포 — 백색 헤어라인 막대
  const bx = 400, bw = 460, bh = 22, rowGap = 64, by = 1300;
  TYPES.forEach((tp, i) => {
    const y = by + i * rowGap;
    x.font = "600 34px " + KO;
    x.fillStyle = i === mine ? "#ffffff" : "rgba(255,255,255,0.6)";
    x.fillText(tp.name, L, y + bh - 2);
    rr(x, bx, y, bw, bh, 11); x.fillStyle = "rgba(255,255,255,0.18)"; x.fill();
    if (counts[i] > 0) {
      rr(x, bx, y, Math.max(bw * (counts[i] / 8), bh), bh, 11);
      x.fillStyle = "#ffffff"; x.globalAlpha = i === mine ? 1 : 0.45; x.fill(); x.globalAlpha = 1;
    }
    x.fillStyle = i === mine ? "#ffffff" : "rgba(255,255,255,0.6)";
    x.fillText(String(counts[i]), bx + bw + 26, y + bh - 2);
  });

  // 하단 임프린트 (책 판권면 느낌)
  hair(1640);
  x.fillStyle = "#ffffff"; x.font = "800 44px " + KO;
  x.fillText("너는 어떤 유형일까?", L, 1716);
  x.fillStyle = "rgba(255,255,255,0.85)"; x.font = "600 34px " + KO;
  x.fillText("@ellieisfree 태그 환영 · 테스트는 프로필 링크", L, 1772);
  x.fillStyle = "rgba(255,255,255,0.95)"; x.font = "700 36px " + KO;
  x.fillText("『왜 내가 쓰는 AI만 멍청해 보일까?』", L, 1846);
  return c;
}

// ?from=유형 진입 시 인트로 개인화 — 친구 초대 루프의 착지 문구
(function () {
  const fromKey = new URLSearchParams(location.search).get("from");
  const ft = TYPES.find(t => t.key === fromKey);
  if (!ft) return;
  const el = document.getElementById("from-line");
  el.textContent = "친구는 '" + ft.nick + "'(" + ft.name + ")이래요. 당신은 어떤 유형일까요?";
  el.style.display = "block";
  track("visit-from-" + ft.key);
})();
track("view");

function shareCard() {
  track("share-card");
  const canvas = drawCard();
  canvas.toBlob(async (blob) => {
    const file = new File([blob], "ai-type-result.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: "30초 AI 활용 유형 테스트" });
        return;
      } catch (e) { /* 사용자가 취소하면 폴백 생략 */ if (e.name === "AbortError") return; }
    }
    // 폴백: 이미지 다운로드 + 다음 행동 안내
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "ai-type-result.png";
    a.click();
    const shareUrl = (location.protocol === "file:" ? PREORDER_URL : location.origin + location.pathname) + "?from=" + TYPES[decideType(answers)].key;
    if (navigator.clipboard) navigator.clipboard.writeText(shareUrl).catch(() => {});
    toast("이미지 저장 + 링크 복사 완료. 스토리 링크 스티커에 붙여넣어 보세요!");
  }, "image/png");
}
